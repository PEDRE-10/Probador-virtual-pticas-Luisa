<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luisa — Asistente</title>
  <link rel="stylesheet" href="css/estilos.css" />
  <style>
    /* Versión compacta del chat para incrustarse (iframe) en el sitio principal */
    body { background: var(--superficie); }
    .chat-marco { display: flex; flex-direction: column; height: 100vh; }
    .chat-cabecera {
      display: flex; align-items: center; gap: 12px; padding: 14px 16px; color: #fff;
      background: linear-gradient(120deg, #0c5f55 0%, #2f9488 60%, #3aa996 100%);
    }
    .avatar-luisa {
      width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
      background: #ffffff; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    .avatar-luisa img { width: 72%; height: auto; }
    .chat-cabecera .quien strong { font-size: 1.05rem; display: block; line-height: 1.2; }
    .chat-cabecera .quien span { font-size: 0.76rem; opacity: 0.92; display: flex; align-items: center; gap: 5px; }
    .punto-vivo { width: 7px; height: 7px; border-radius: 50%; background: #6dff9e; display: inline-block; animation: latido 1.6s infinite; }
    @keyframes latido { 0%,100% { box-shadow: 0 0 0 0 rgba(109,255,158,0.55);} 50% { box-shadow: 0 0 0 5px rgba(109,255,158,0);} }
    #conversacion { flex: 1; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; padding: 16px; }
    .fila { display: flex; gap: 8px; align-items: flex-end; animation: aparecer 0.3s ease both; }
    .fila.usuario { justify-content: flex-end; }
    @keyframes aparecer { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; transform: translateY(0);} }
    .mini-avatar {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
      background: #ffffff; border: 1px solid var(--linea);
      display: flex; align-items: center; justify-content: center;
    }
    .mini-avatar img { width: 72%; height: auto; }
    .burbuja { max-width: 82%; padding: 10px 13px; border-radius: 15px; white-space: pre-wrap; font-size: 0.92rem; line-height: 1.45; }
    .fila.usuario .burbuja { background: linear-gradient(120deg, #2f9488, #0f6e62); color: #fff; border-bottom-right-radius: 5px; }
    .fila.asistente .burbuja { background: var(--plano); border: 1px solid var(--linea); border-bottom-left-radius: 5px; }
    .puntos { display: inline-flex; gap: 4px; padding: 3px 2px; }
    .puntos i { width: 7px; height: 7px; border-radius: 50%; background: #2f9488; display: block; animation: rebote 1.2s infinite; }
    .puntos i:nth-child(2) { animation-delay: 0.15s; }
    .puntos i:nth-child(3) { animation-delay: 0.3s; }
    @keyframes rebote { 0%,60%,100% { transform: translateY(0); opacity: .45;} 30% { transform: translateY(-5px); opacity: 1;} }
    .zona-escribir { padding: 10px 12px 12px; border-top: 1px solid var(--linea); }
    #formulario { display: flex; gap: 8px; }
    #entrada { flex: 1; border-radius: 999px; padding: 11px 16px; font-size: 0.95rem; border: 2px solid var(--linea); }
    #entrada:focus { outline: none; border-color: var(--acento); }
    #btnEnviar {
      width: 44px; height: 44px; border-radius: 50%; border: 0; cursor: pointer; flex-shrink: 0;
      background: linear-gradient(130deg, #2f9488, #0f6e62); color: #fff; font-size: 1.1rem;
    }
    .sugerencias { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .sugerencias button {
      border: 1px solid var(--linea); background: var(--superficie); color: var(--tinta-2);
      border-radius: 999px; padding: 6px 11px; cursor: pointer; font-size: 0.78rem;
    }
    .sugerencias button:hover { border-color: var(--acento); color: var(--acento); }
  </style>
</head>
<body>
  <div class="chat-marco">
    <div class="chat-cabecera">
      <div class="avatar-luisa" id="avatarLuisa">
        <img src="img/logo.png" alt="Luisa" />
      </div>
      <div class="quien">
        <strong>Luisa</strong>
        <span><i class="punto-vivo"></i> Asistente de Ópticas Luisa · En línea</span>
      </div>
    </div>
    <div id="conversacion"></div>
    <div class="zona-escribir">
      <form id="formulario">
        <input type="text" id="entrada" placeholder="Escríbele a Luisa…" autocomplete="off" />
        <button type="submit" id="btnEnviar" aria-label="Enviar">➤</button>
      </form>
      <div class="sugerencias">
        <button type="button">👓 ¿Qué armazón me queda?</button>
        <button type="button">📅 Agendar una cita</button>
        <button type="button">📋 Explícame mi graduación</button>
      </div>
    </div>
  </div>
  <script src="js/asistente.js"></script>
</body>
</html>
