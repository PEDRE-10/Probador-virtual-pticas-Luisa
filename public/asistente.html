<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asistente IA — Ópticas Luisa</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👓</text></svg>" />
  <link rel="stylesheet" href="css/estilos.css" />
  <style>
    #conversacion { display: flex; flex-direction: column; gap: 10px; min-height: 320px; max-height: 55vh; overflow-y: auto; padding: 4px; }
    .burbuja { max-width: 78%; padding: 10px 14px; border-radius: 14px; white-space: pre-wrap; font-size: 0.95rem; }
    .burbuja.usuario { align-self: flex-end; background: var(--acento); color: #fff; border-bottom-right-radius: 4px; }
    .burbuja.asistente { align-self: flex-start; background: var(--superficie); border: 1px solid var(--linea); border-bottom-left-radius: 4px; }
    .burbuja.escribiendo { color: var(--tinta-suave); font-style: italic; }
    #formulario { display: flex; gap: 8px; margin-top: 14px; }
    #entrada { flex: 1; }
    .sugerencias { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .sugerencias button { border: 1px dashed var(--linea); background: transparent; color: var(--tinta-2); border-radius: 999px; padding: 6px 12px; cursor: pointer; font-size: 0.85rem; }
    .sugerencias button:hover { border-color: var(--acento); color: var(--acento); }
  </style>
</head>
<body>
  <header class="sitio">
    <a class="logo" href="index.html">Ópticas <span>Luisa</span></a>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="probador.html">Probador virtual</a>
      <a href="receta.html">Lector de recetas</a>
      <a href="asistente.html" class="activo">Asistente IA</a>
      <a href="citas.html">Citas</a>
      <a href="admin.html">Panel administrativo</a>
    </nav>
  </header>

  <main>
    <h1>Asistente virtual «Luisa»</h1>
    <p class="sub">Pregúntale lo que quieras: es experta en lentes, graduaciones y tratamientos, y puede agendar tu cita al momento.</p>

    <div class="tarjeta">
      <div id="conversacion"></div>
      <form id="formulario">
        <input type="text" id="entrada" placeholder="Escribe tu pregunta…" autocomplete="off" />
        <button type="submit" class="boton">Enviar</button>
      </form>
      <div class="sugerencias">
        <button type="button">¿Qué significa mi graduación -2.50?</button>
        <button type="button">¿Qué son los lentes progresivos?</button>
        <button type="button">Quiero agendar una cita</button>
        <button type="button">¿Me conviene el filtro de luz azul?</button>
      </div>
    </div>
  </main>

  <script src="js/asistente.js"></script>
</body>
</html>
